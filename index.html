<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jiu-Jitsu Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #e8e8e8;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  h1 {
    font-size: 26px;
    color: #00d4aa;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 20px;
    margin-top: 30px;
    margin-bottom: 10px;
    color: #ffd24c;
  }
  .btn {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 12px auto;
    padding: 14px 18px;
    width: 92%;
    max-width: 420px;
    font-size: 18px;
    color: #000;
    background: #00d4aa;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    gap: 10px;
    cursor: pointer;
  }
  .btn:hover {
    background: #00b38c;
  }
  .toggle-btn {
    padding: 10px 16px;
    margin: 10px;
    border-radius: 8px;
    background: #444;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
  }
  .toggle-btn:hover {
    background: #666;
  }
  .log-entry {
    margin: 6px 0;
  }
  #stats-page {
    display: none;
  }
  .user-selector {
    background: #1a1a1a;
    padding: 16px;
    border-radius: 12px;
    max-width: 420px;
    margin: 0 auto 20px;
    border: 2px solid #333;
  }
  .user-selector-label {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 10px;
  }
  .user-option {
    display: inline-block;
    padding: 10px 24px;
    margin: 5px;
    border-radius: 8px;
    background: #2a2a2a;
    color: #e8e8e8;
    border: 2px solid #444;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    user-select: none;
  }
  .user-option.active {
    background: #00d4aa;
    color: #000;
    border-color: #00d4aa;
  }
  .stats-person {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 16px;
    margin: 20px auto;
    max-width: 420px;
    text-align: left;
  }
  .stats-person h3 {
    color: #ffd24c;
    margin-top: 0;
    margin-bottom: 10px;
  }
  .reset-btn {
    background: #d44;
    font-size: 14px;
    padding: 8px 14px;
  }
  .reset-btn:hover {
    background: #b33;
  }
</style>

<script>
// ------------------------------
// Attendees (fixed list)
// ------------------------------
const USERS = ["Greg Streatfield", "Harry Streatfield"];

function getCurrentUser() {
    const saved = localStorage.getItem("currentUser");
    return USERS.includes(saved) ? saved : USERS[0];
}

function setCurrentUser(name) {
    localStorage.setItem("currentUser", name);
    renderUserSelector();
    generateClassButtons();
}

function renderUserSelector() {
    const container = document.getElementById("user-selector");
    const current = getCurrentUser();
    container.innerHTML = `
        <div class="user-selector-label">Who's attending?</div>
        ${USERS.map(u => `
            <div class="user-option ${u === current ? 'active' : ''}"
                 onclick="setCurrentUser('${u}')">${u}</div>
        `).join('')}
    `;
}

// ------------------------------
// Classes
// ------------------------------
const CLASSES = [
    { emoji: "🧒", name: "Resilient Kids" },
    { emoji: "🐯", name: "Junior Grapplers" },
    { emoji: "🌱", name: "Adult Fundamentals" },
    { emoji: "🧠", name: "Adult Intermediate" },
    { emoji: "🥋", name: "Adult Advanced" },
    { emoji: "☀️", name: "Adult Morning Class" },
    { emoji: "🔥", name: "NOGI Pro" },
    { emoji: "🤼", name: "NOGI Fundamentals" },
    { emoji: "🥷", name: "Judo" },
    { emoji: "🎯", name: "Private lesson" },
    { emoji: "🏆", name: "Competition class" }
];

function generateClassButtons() {
    const container = document.getElementById("class-buttons");
    const user = getCurrentUser();
    const encodedName = encodeURIComponent(user);

    container.innerHTML = CLASSES.map(cls => {
        const encodedClass = encodeURIComponent(cls.name);
        const url = `https://docs.google.com/forms/d/e/1FAIpQLScduYrHvB6E6KJwzUijnkhuWX3o2K14hsE6hSri_ZUwc0athA/viewform?usp=pp_url&entry.1282538522=${encodedName}&entry.1421475455=${encodedClass}`;

        // Safely escape names for the inline onclick handler
        const safeUser = user.replace(/'/g, "\\'");
        const safeClass = cls.name.replace(/'/g, "\\'");

        return `
            <a class="btn" href="${url}" target="_blank" rel="noopener"
               onclick="logAttendance('${safeUser}','${safeClass}')">
                ${cls.emoji} ${cls.name}
            </a>
        `;
    }).join('');
}

// ------------------------------
// Attendance Logging
// ------------------------------
function logAttendance(name, session) {
    const key = "attendanceLog";
    let logs = JSON.parse(localStorage.getItem(key) || "[]");
    logs.push({
        name,
        session,
        date: new Date().toLocaleString()
    });
    localStorage.setItem(key, JSON.stringify(logs));
}

function updateStats() {
    const logs = JSON.parse(localStorage.getItem("attendanceLog") || "[]");
    let html = "";

    USERS.forEach(user => {
        const userLogs = logs.filter(l => l.name === user);
        const stats = {};
        userLogs.forEach(l => {
            stats[l.session] = (stats[l.session] || 0) + 1;
        });

        let personHtml = `<div class="stats-person"><h3>${user} — ${userLogs.length} total</h3>`;
        if (Object.keys(stats).length === 0) {
            personHtml += `<div class="log-entry" style="color:#888;">No attendance logged yet.</div>`;
        } else {
            // Sort sessions by count descending
            const sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
            for (const [s, c] of sorted) {
                personHtml += `<div class="log-entry">${s}: <strong>${c}</strong></div>`;
            }
        }
        personHtml += `</div>`;
        html += personHtml;
    });

    document.getElementById("stats-content").innerHTML = html;
}

function clearLogs() {
    if (confirm("This will clear ALL attendance logs for both Greg and Harry. Continue?")) {
        localStorage.removeItem("attendanceLog");
        updateStats();
    }
}

// ------------------------------
// Page Navigation
// ------------------------------
function showMain() {
    document.getElementById("main-page").style.display = "block";
    document.getElementById("stats-page").style.display = "none";
}

function showStats() {
    document.getElementById("stats-page").style.display = "block";
    document.getElementById("main-page").style.display = "none";
    updateStats();
}

// ------------------------------
// Init
// ------------------------------
window.onload = function() {
    renderUserSelector();
    generateClassButtons();
    showMain();
};
</script>

</head>
<body>

<h1>Jiu-Jitsu Attendance</h1>

<!-- ------------------------------- -->
<!--       MAIN PAGE                 -->
<!-- ------------------------------- -->
<div id="main-page">
    <div class="user-selector" id="user-selector"></div>

    <button class="toggle-btn" onclick="showStats()">📊 View Stats</button>

    <div class="section-title">Select Your Class</div>
    <div id="class-buttons"></div>
</div>

<!-- ------------------------------- -->
<!--       STATS PAGE                -->
<!-- ------------------------------- -->
<div id="stats-page">
    <h2>📊 Attendance Stats</h2>
    <div id="stats-content"></div>
    <br>
    <button class="toggle-btn" onclick="showMain()">⬅ Back</button>
    <button class="toggle-btn reset-btn" onclick="clearLogs()">🗑 Clear Logs</button>
</div>

</body>
</html>
